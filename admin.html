<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Workspace — Admin</title>
<style>
:root{
  --green:#43A047;--green-dk:#2E7D32;--green-lt:#E8F5E9;
  --blue:#1E88E5;--blue-lt:#E3F2FD;
  --red:#E53935;--red-lt:#FFEBEE;
  --orange:#FB8C00;--orange-lt:#FFF3E0;
  --border:#E0E0E0;--text:#212121;--text2:#616161;--text3:#9E9E9E;
  --bg:#F5F7FA;--card:#fff;
  --radius:8px;--shadow:0 1px 4px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.hdr{background:#1A3529;color:#fff;padding:0 20px;display:flex;align-items:center;gap:10px;height:50px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo{font-weight:800;font-size:14px;color:#A5D6A7}.logo span{color:#fff}
.hdr-actions{margin-left:auto;display:flex;align-items:center;gap:6px}
.pub-st{font-size:11px;color:rgba(255,255,255,.55);margin-right:4px}
.btn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}.btn-ghost:hover{background:rgba(255,255,255,.2)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:var(--green-dk)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#C62828}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}.btn-outline:hover{background:#F5F5F5}
.btn-sm{padding:4px 9px;font-size:11px}

/* SETTINGS BAR */
.sf-bar{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;display:none;flex-wrap:wrap;gap:10px;align-items:flex-end}
.sf-bar.open{display:flex}
.sf-g{display:flex;flex-direction:column;gap:3px}
.sf-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.sf-inp{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none;font-family:inherit}
.sf-inp:focus{border-color:var(--green)}

/* TABS */
.tabs{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;display:flex;flex-shrink:0}
.tab{padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);transition:all .15s;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--text)}.tab.active{color:var(--green-dk);border-bottom-color:var(--green)}
.tab-c{background:var(--green-lt);color:var(--green-dk);font-size:10px;padding:1px 5px;border-radius:8px;font-weight:700}

/* LAYOUT */
.main{flex:1;display:flex;overflow:hidden}
.list-pane{width:340px;min-width:240px;border-right:1px solid var(--border);background:#fff;display:flex;flex-direction:column;flex-shrink:0}
.list-top{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.list-search{flex:1;padding:6px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none;font-family:inherit}
.list-search:focus{border-color:var(--green)}
.list-body{flex:1;overflow-y:auto}

/* SUB NAV (references) */
.sub-nav{background:#FAFAFA;border-bottom:1px solid var(--border);display:flex;padding:0 12px;flex-shrink:0}
.sub-tab{padding:7px 10px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s}
.sub-tab.active{color:var(--green-dk);border-bottom-color:var(--green)}

/* LIST ROWS */
.row{padding:9px 14px;border-bottom:1px solid #F5F5F5;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.row:hover{background:#FAFAFA}.row.active{background:var(--green-lt)}
.op-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.op-available{background:#43A047}.op-degraded{background:#FB8C00}.op-unavailable{background:#E53935}.op-maintenance{background:#9E9E9E}
.row-info{flex:1;min-width:0}
.row-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:11px;color:var(--text3);margin-top:1px}
.pill{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;text-transform:uppercase;flex-shrink:0}
.row-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:3px 5px;border-radius:4px;opacity:0;transition:opacity .1s}
.row:hover .row-del{opacity:1}.row-del:hover{color:var(--red);background:var(--red-lt)}

/* EDIT PANE */
.edit-pane{flex:1;overflow-y:auto;padding:20px;background:var(--bg)}
.empty-pane{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--text3);font-size:13px}
.empty-pane h3{font-size:15px;font-weight:700;color:var(--text2)}

/* FORM */
.form-h{font-size:15px;font-weight:800;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.form-h .badge{font-size:11px;background:var(--green-lt);color:var(--green-dk);padding:2px 8px;border-radius:8px;font-weight:600}
.sec{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:12px}
.sec-h{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sec-add{margin-left:auto;font-size:10px;padding:3px 8px;text-transform:none;letter-spacing:0}
.fr{margin-bottom:12px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.fr-last{margin-bottom:0}
label{display:block;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
input[type=text],input[type=email],input[type=date],input[type=number],input[type=password],select,textarea{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:inherit;outline:none;background:#fff;color:var(--text);transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(67,160,71,.08)}
textarea{resize:vertical;line-height:1.5}
.swatch{width:28px;height:28px;border-radius:4px;border:1px solid var(--border);cursor:pointer;flex-shrink:0;display:inline-block}

/* DYNAMIC ITEMS */
.di{background:#FAFAFA;border:1px solid var(--border);border-radius:5px;padding:9px 11px;margin-bottom:7px;position:relative}
.di-del{position:absolute;top:5px;right:5px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:2px 5px;border-radius:3px}
.di-del:hover{color:var(--red);background:var(--red-lt)}
.di2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.di4{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:6px;margin-bottom:7px}

/* FORM FOOTER */
.f-foot{display:flex;align-items:center;gap:7px;padding-top:8px;border-top:1px solid var(--border);margin-top:6px}
.f-hint{font-size:11px;color:var(--text3);margin-left:auto}

/* JSON editor */
.json-ed{font-family:'Courier New',monospace;font-size:11px;background:#1A1A2E;color:#A8FF78;border:1px solid #333;border-radius:5px;min-height:140px}
.json-err{font-size:11px;color:var(--red);margin-top:4px;display:none}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:#1A3529;color:#fff;padding:9px 16px;border-radius:7px;font-size:12px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:9999;transform:translateY(80px);opacity:0;transition:all .22s;max-width:340px}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{background:var(--red)}.toast.ok{background:var(--green-dk)}

/* REFERENCE TABLE */
.ref-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid #F5F5F5;font-size:12px;cursor:pointer;transition:background .1s}
.ref-row:hover{background:#FAFAFA}.ref-row.active{background:var(--green-lt)}
.ref-row .ref-id{font-size:10px;color:var(--text3);font-family:monospace;min-width:100px}
.ref-row .ref-name{font-weight:600;flex:1}
.ref-row .ref-extra{color:var(--text3);font-size:11px}
.color-preview{width:14px;height:14px;border-radius:3px;flex-shrink:0;border:1px solid rgba(0,0,0,.1)}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">PW <span>Admin</span></div>
  <div class="hdr-actions">
    <span class="pub-st" id="pubSt"></span>
    <button class="btn btn-ghost" onclick="toggleSF()">⚙ Settings</button>
    <button class="btn btn-ghost" onclick="loadFromGH()">⬇ Load</button>
    <button class="btn btn-green" onclick="publishToGH()">📤 Publish</button>
    <a href="index.html" target="_blank" class="btn btn-ghost">👁 Preview</a>
  </div>
</div>

<!-- SETTINGS -->
<div class="sf-bar" id="sfBar">
  <div class="sf-g"><div class="sf-lbl">GitHub PAT</div><input class="sf-inp" type="password" id="cfgPat" placeholder="ghp_xxxx" style="width:240px"></div>
  <div class="sf-g"><div class="sf-lbl">Repository</div><input class="sf-inp" type="text" id="cfgRepo" value="stemmets/personal-workspace" style="width:220px"></div>
  <div class="sf-g"><div class="sf-lbl">Branch</div><input class="sf-inp" type="text" id="cfgBranch" value="main" style="width:90px"></div>
  <div class="sf-g"><div class="sf-lbl">File path</div><input class="sf-inp" type="text" id="cfgPath" value="data.json" style="width:100px"></div>
  <button class="btn btn-green" style="align-self:flex-end" onclick="saveCfg()">Save</button>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" id="t-ref"  onclick="switchTab('ref')">📚 Reference Data</div>
  <div class="tab" id="t-svc"  onclick="switchTab('svc')">🔧 Services <span class="tab-c" id="tc-svc">0</span></div>
  <div class="tab" id="t-proc" onclick="switchTab('proc')">🗺 Processes <span class="tab-c" id="tc-proc">0</span></div>
  <div class="tab" id="t-art"  onclick="switchTab('art')">📄 Articles <span class="tab-c" id="tc-art">0</span></div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="list-pane">
    <!-- sub-nav for references -->
    <div class="sub-nav" id="subNav">
      <div class="sub-tab active" id="st-domains" onclick="switchRef('domains')">Domains</div>
      <div class="sub-tab" id="st-topics"  onclick="switchRef('topics')">Topics</div>
      <div class="sub-tab" id="st-systems" onclick="switchRef('systems')">Systems</div>
      <div class="sub-tab" id="st-teams"   onclick="switchRef('teams')">Teams</div>
    </div>
    <div class="list-top">
      <input class="list-search" type="text" id="listQ" placeholder="Filter…" oninput="renderList()">
      <button class="btn btn-green btn-sm" id="addBtn" onclick="startNew()">+ Add</button>
    </div>
    <div class="list-body" id="listBody"></div>
  </div>
  <div class="edit-pane" id="editPane">
    <div class="empty-pane">
      <h3>Select an item</h3>
      <p>Choose from the list or click + Add</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════
//  STATE
// ═══════════════════════════
let DOMAINS=[], TOPICS=[], SYSTEMS=[], TEAMS=[], SERVICES=[], PROCESSES=[], ARTICLES=[];
let activeTab = 'ref';
let activeRef = 'domains';
let editId    = null;
let dirty     = false;

const ACTION_TYPES   = ['primary','related','support','admin'];
const HANDLING_TYPES = ['url','contact_owner','external_form','manual_step'];
const OP_STATUSES    = ['available','degraded','unavailable','maintenance'];

// ═══════════════════════════
//  CONFIG
// ═══════════════════════════
let cfg = {pat:'', repo:'stemmets/personal-workspace', branch:'main', path:'data.json'};

function loadCfg(){
  const s = localStorage.getItem('pw_adm_cfg');
  if(s) try{cfg={...cfg,...JSON.parse(s)}}catch(e){}
  document.getElementById('cfgPat').value    = cfg.pat;
  document.getElementById('cfgRepo').value   = cfg.repo;
  document.getElementById('cfgBranch').value = cfg.branch;
  document.getElementById('cfgPath').value   = cfg.path;
}
function saveCfg(){
  cfg.pat    = document.getElementById('cfgPat').value.trim();
  cfg.repo   = document.getElementById('cfgRepo').value.trim();
  cfg.branch = document.getElementById('cfgBranch').value.trim();
  cfg.path   = document.getElementById('cfgPath').value.trim();
  localStorage.setItem('pw_adm_cfg', JSON.stringify(cfg));
  toast('Settings saved','ok');
}
function toggleSF(){ document.getElementById('sfBar').classList.toggle('open'); }

// ═══════════════════════════
//  GITHUB
// ═══════════════════════════
function ghH(){ return {'Authorization':`token ${cfg.pat}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'}; }

async function loadFromGH(){
  if(!cfg.pat){toast('Set GitHub PAT first','err');return;}
  setPub('Loading…');
  try{
    const r = await fetch(`https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}?ref=${cfg.branch}`,{headers:ghH()});
    if(!r.ok) throw new Error(`GitHub ${r.status}`);
    const f = await r.json();
    applyData(JSON.parse(atob(f.content.replace(/\n/g,''))));
    saveDraft();
    renderList(); updateCounts();
    setPub('Loaded from GitHub');
    toast(`Loaded successfully`,'ok');
  }catch(e){setPub('');toast('Load failed: '+e.message,'err');}
}

async function publishToGH(){
  if(!cfg.pat){toast('Set GitHub PAT first','err');return;}
  setPub('Publishing…');
  try{
    let sha=null;
    const gr=await fetch(`https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}?ref=${cfg.branch}`,{headers:ghH()});
    if(gr.ok){const gf=await gr.json();sha=gf.sha;}
    const content=JSON.stringify(exportData(),null,2);
    const body={message:'Update service catalog [admin panel]',content:btoa(unescape(encodeURIComponent(content))),branch:cfg.branch};
    if(sha) body.sha=sha;
    const pr=await fetch(`https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}`,{method:'PUT',headers:ghH(),body:JSON.stringify(body)});
    if(!pr.ok){const e=await pr.json();throw new Error(e.message||pr.status);}
    dirty=false; setPub('Published ✓');
    toast('✓ Published! Vercel deploys in ~30s','ok');
  }catch(e){setPub('');toast('Publish failed: '+e.message,'err');}
}

// ═══════════════════════════
//  DRAFT
// ═══════════════════════════
function exportData(){ return {domains:DOMAINS,topics:TOPICS,systems:SYSTEMS,teams:TEAMS,services:SERVICES,processes:PROCESSES,articles:ARTICLES}; }
function applyData(d){ DOMAINS=d.domains||[];TOPICS=d.topics||[];SYSTEMS=d.systems||[];TEAMS=d.teams||[];SERVICES=d.services||[];PROCESSES=d.processes||[];ARTICLES=d.articles||[]; }
function saveDraft(){ localStorage.setItem('pw_adm_draft',JSON.stringify(exportData())); dirty=true; setPub('Unsaved changes'); }
function loadDraft(){ const s=localStorage.getItem('pw_adm_draft'); if(!s) return false; try{applyData(JSON.parse(s));return true;}catch(e){return false;} }

// ═══════════════════════════
//  UI HELPERS
// ═══════════════════════════
function setPub(m){ document.getElementById('pubSt').textContent=m; }
let _tt;
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  clearTimeout(_tt); _tt=setTimeout(()=>{t.className='toast';},3200);
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function updateCounts(){
  document.getElementById('tc-svc').textContent  = SERVICES.length;
  document.getElementById('tc-proc').textContent = PROCESSES.length;
  document.getElementById('tc-art').textContent  = ARTICLES.length;
}

function switchTab(tab){
  activeTab=tab; editId=null;
  ['ref','svc','proc','art'].forEach(t=>{
    document.getElementById('t-'+t).classList.toggle('active',t===tab);
  });
  document.getElementById('subNav').style.display = tab==='ref' ? 'flex' : 'none';
  resetPane(); renderList();
}

function switchRef(ref){
  activeRef=ref; editId=null;
  ['domains','topics','systems','teams'].forEach(r=>{
    document.getElementById('st-'+r).classList.toggle('active',r===ref);
  });
  resetPane(); renderList();
}

function resetPane(){
  document.getElementById('editPane').innerHTML=`<div class="empty-pane"><h3>Select an item</h3><p>Choose from the list or click + Add</p></div>`;
}

// ═══════════════════════════
//  LIST
// ═══════════════════════════
function renderList(){
  const q=(document.getElementById('listQ').value||'').toLowerCase().trim();
  const body=document.getElementById('listBody');
  let html='';

  if(activeTab==='ref'){
    const map={domains:DOMAINS,topics:TOPICS,systems:SYSTEMS,teams:TEAMS};
    const items=(map[activeRef]||[]).filter(i=>!q||i.name.toLowerCase().includes(q)||i.id.toLowerCase().includes(q));
    if(!items.length){html='<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">Nothing here yet</div>';}
    else items.forEach(i=>{
      const extra = activeRef==='topics' ? `<span class="color-preview" style="background:${i.bg||'#eee'}"></span> ${i.domainId||''}` :
                    activeRef==='systems' ? i.ownerTeamId||'' :
                    activeRef==='teams'   ? (i.contactEmail||'') : (i.desc||'');
      html+=`<div class="ref-row${editId===i.id?' active':''}" onclick="editItem('${i.id}')">
        <span class="ref-id">${esc(i.id)}</span>
        <span class="ref-name">${esc(i.name)}</span>
        <span class="ref-extra">${esc(extra)}</span>
        <button class="row-del" onclick="event.stopPropagation();delItem('${i.id}')">✕</button>
      </div>`;
    });
  } else if(activeTab==='svc'){
    const items=SERVICES.filter(s=>!q||s.name.toLowerCase().includes(q)||(s.topicId||'').includes(q));
    if(!items.length){html='<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">No services</div>';}
    else items.forEach(s=>{
      const topic=TOPICS.find(t=>t.id===s.topicId)||{};
      html+=`<div class="row${editId===s.id?' active':''}" onclick="editItem('${s.id}')">
        <span class="op-dot op-${s.opStatus||'available'}"></span>
        <div class="row-info"><div class="row-name">${esc(s.name)}</div><div class="row-sub">${esc((SYSTEMS.find(x=>x.id===s.systemId)||{}).name||s.systemId||'')}</div></div>
        <span class="pill" style="background:${topic.bg||'#eee'};color:${topic.color||'#666'}">${esc(topic.name||s.topicId||'')}</span>
        <button class="row-del" onclick="event.stopPropagation();delItem('${s.id}')">✕</button>
      </div>`;
    });
  } else if(activeTab==='proc'){
    const items=PROCESSES.filter(p=>!q||p.name.toLowerCase().includes(q));
    if(!items.length){html='<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">No processes</div>';}
    else items.forEach(p=>{
      html+=`<div class="row${editId===p.id?' active':''}" onclick="editItem('${p.id}')">
        <span style="font-size:16px;flex-shrink:0">${p.icon||'📋'}</span>
        <div class="row-info"><div class="row-name">${esc(p.name)}</div><div class="row-sub">${(p.steps||[]).length} steps</div></div>
        <button class="row-del" onclick="event.stopPropagation();delItem('${p.id}')">✕</button>
      </div>`;
    });
  } else if(activeTab==='art'){
    const items=ARTICLES.filter(a=>!q||a.title.toLowerCase().includes(q));
    if(!items.length){html='<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">No articles yet</div>';}
    else items.forEach(a=>{
      html+=`<div class="row${editId===a.id?' active':''}" onclick="editItem('${a.id}')">
        <div class="row-info"><div class="row-name">${esc(a.title)}</div><div class="row-sub">${esc(a.type||'')} · ${esc((SERVICES.find(s=>s.id===a.serviceId)||{}).name||a.serviceId||'')}</div></div>
        <button class="row-del" onclick="event.stopPropagation();delItem('${a.id}')">✕</button>
      </div>`;
    });
  }
  body.innerHTML=html;
  updateCounts();
}

// ═══════════════════════════
//  CRUD ACTIONS
// ═══════════════════════════
function startNew(){ editId='__new__'; renderList(); renderForm(null); }

function editItem(id){
  editId=id; renderList();
  let item=null;
  if(activeTab==='ref'){const arr={domains:DOMAINS,topics:TOPICS,systems:SYSTEMS,teams:TEAMS}[activeRef];item=arr.find(x=>x.id===id);}
  else if(activeTab==='svc'){item=SERVICES.find(s=>s.id===id);}
  else if(activeTab==='proc'){item=PROCESSES.find(p=>p.id===id);}
  else if(activeTab==='art'){item=ARTICLES.find(a=>a.id===id);}
  renderForm(item);
}

function delItem(id){
  if(!confirm('Delete?')) return;
  if(activeTab==='ref'){
    const map={domains:DOMAINS,topics:TOPICS,systems:SYSTEMS,teams:TEAMS};
    const arr=map[activeRef]; const i=arr.findIndex(x=>x.id===id); if(i>=0) arr.splice(i,1);
  } else if(activeTab==='svc'){ const i=SERVICES.findIndex(s=>s.id===id); if(i>=0) SERVICES.splice(i,1); }
  else if(activeTab==='proc'){ const i=PROCESSES.findIndex(p=>p.id===id); if(i>=0) PROCESSES.splice(i,1); }
  else if(activeTab==='art'){ const i=ARTICLES.findIndex(a=>a.id===id); if(i>=0) ARTICLES.splice(i,1); }
  if(editId===id){editId=null;resetPane();}
  saveDraft(); renderList(); toast('Deleted');
}

function renderForm(item){

  } else if(activeTab==='svc')  renderSvcForm(item);
  else if(activeTab==='proc') renderProcForm(item);
  else if(activeTab==='art')  renderArtForm(item);
}

function precRow(val,i){ _pc=Math.max(_pc,i+1);

function addPrec(){ const l=document.getElementById('fPrec'); l.insertAdjacentHTML('beforeend',precRow('',_pc++)); document.getElementById('fPrecEmpty').style.display='none'; }

function actRow(a,i){ _ac=Math.max(_ac,i+1);
  const tOpts=ACTION_TYPES.map(t=>`<option${a.type===t?' selected':''}>${t}</option>`).join('');
  const hOpts=HANDLING_TYPES.map(h=>`<option value="${h}"${a.handling===h?' selected':''}>${h}</option>`).join('');
  return `<div class="di" id="ac-${i}">
    <button class="di-del" onclick="delDyn('ac-${i}','fActs','fActsEmpty')">✕</button>
    <div class="di4"><div><label style="font-size:9px;margin-bottom:2px">Name</label><input type="text" value="${esc(a.name||'')}" placeholder="Action name"></div>
    <div><label style="font-size:9px;margin-bottom:2px">Type</label><select>${tOpts}</select></div>
    <div><label style="font-size:9px;margin-bottom:2px">Handling</label><select>${hOpts}</select></div>
    <div><label style="font-size:9px;margin-bottom:2px">Tier</label><input type="number" value="${a.tier||1}" min="1" max="3"></div></div>
    <div><label style="font-size:9px;margin-bottom:2px">Description</label><input type="text" value="${esc(a.desc||'')}" placeholder="What does this do?"></div>
  </div>`; }
function addAct(){ const l=document.getElementById('fActs'); l.insertAdjacentHTML('beforeend',actRow({type:'related',handling:'url',tier:1},_ac++)); document.getElementById('fActsEmpty').style.display='none'; }

function ecoRow(e,i){ _ec=Math.max(_ec,i+1);
  return `<div class="di" id="ec-${i}">
    <button class="di-del" onclick="delDyn('ec-${i}','fEco','fEcoEmpty')">✕</button>

function delDyn(id,listId,emptyId){ document.getElementById(id)?.remove(); if(!document.getElementById(listId).children.length) document.getElementById(emptyId).style.display=''; }

function saveSvc(){
  const id=v('fId'),name=v('fName');
  if(!id||!name){toast('ID and name required','err');return;}
  if(!/^[a-z0-9-]+$/.test(id)){toast('ID must be lowercase letters, numbers, hyphens','err');return;}
  const precs=Array.from(document.querySelectorAll('#fPrec .di input[type=text]')).map(i=>i.value.trim()).filter(Boolean);
  const acts=Array.from(document.querySelectorAll('#fActs .di')).map(el=>{
    const ins=el.querySelectorAll('input,select');
    return{name:ins[0]?.value||'',type:ins[1]?.value||'related',handling:ins[2]?.value||'url',tier:parseInt(ins[3]?.value||1),desc:ins[4]?.value||''};
  }).filter(a=>a.name);
  const ecos=Array.from(document.querySelectorAll('#fEco .di')).map(el=>{
    const ins=el.querySelectorAll('input[type=text]');
    return{name:ins[0]?.value||'',icon:ins[1]?.value||'',ctx:ins[2]?.value||''};
  }).filter(e=>e.name);
  const obj={id,name,goal:v('fGoal'),desc:v('fDesc'),domainId:v('fDomain'),topicId:v('fTopic'),systemId:v('fSystem'),ownerTeamId:v('fTeam'),status:v('fStatus'),opStatus:v('fOp'),

    reviewedAt:v('fReviewed'),reviewCycle:parseInt(v('fCycle')||6)};
  upsert(SERVICES,obj); saveDraft(); editId=id; renderList();
  toast(`Service "${name}" saved`,'ok');
}

// ═══════════════════════════
//  UTILS
// ═══════════════════════════
function v(id){ return (document.getElementById(id)?.value||'').trim(); }
function autoId(idField,nameField){
  const f=document.getElementById(idField);
  if(f&&!f.readOnly) f.value=(document.getElementById(nameField)?.value||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}
function upsert(arr,obj){ const i=arr.findIndex(x=>x.id===obj.id); if(i>=0) arr[i]=obj; else arr.push(obj); }
function cancelEdit(){ editId=null; resetPane(); renderList(); }

// ═══════════════════════════
//  INIT
// ═══════════════════════════
async function init(){
  loadCfg();
  if(loadDraft()){
    setPub('Draft loaded');
  } else {
    try{
      const r=await fetch('./data.json?t='+Date.now());
      if(r.ok){ applyData(await r.json()); saveDraft(); setPub('Loaded from data.json'); }
    }catch(e){}
  }
  renderList(); updateCounts();
}
init();
</script>
